# File-based access control — protects PII tables from non-privileged users.
# Rules defined in /etc/trino/rules.json (HIPAA: only 'data_engineer' role
# can read unmasked dim_patient; everyone else gets dim_patient_masked).
access-control.name=file
security.config-file=/etc/trino/rules.json
security.refresh-period=60s

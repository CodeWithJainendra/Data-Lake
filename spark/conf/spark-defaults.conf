# =============================================================================
# Spark configuration for the Data Lake
# CRITICAL: We use s3:// URLs everywhere (NOT s3a://) so that Trino's native
# S3 filesystem can read the same tables that Spark writes. The trick below
# maps the s3:// scheme to Hadoop's S3A driver inside Spark.
# =============================================================================

# Make Spark treat s3:// URLs as S3A (so we get the S3A driver but Trino-compatible URLs)
spark.hadoop.fs.s3.impl                          org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.AbstractFileSystem.s3.impl       org.apache.hadoop.fs.s3a.S3A
spark.hadoop.fs.s3a.impl                         org.apache.hadoop.fs.s3a.S3AFileSystem

# MinIO endpoint and credentials (used for BOTH s3:// and s3a:// schemes)
spark.hadoop.fs.s3a.endpoint                     http://minio:9000
spark.hadoop.fs.s3a.access.key                   admin
spark.hadoop.fs.s3a.secret.key                   admin123456
spark.hadoop.fs.s3a.path.style.access            true
spark.hadoop.fs.s3a.connection.ssl.enabled       false
spark.hadoop.fs.s3a.aws.credentials.provider     org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.committer.name               directory
spark.hadoop.fs.s3a.fast.upload                  true

# Hive Metastore
spark.sql.catalogImplementation                  hive
spark.hadoop.hive.metastore.uris                 thrift://hive-metastore:9083
spark.sql.warehouse.dir                          s3://warehouse/

# Performance
spark.sql.adaptive.enabled                       true
spark.sql.adaptive.coalescePartitions.enabled    true
spark.serializer                                 org.apache.spark.serializer.KryoSerializer
spark.sql.parquet.compression.codec              snappy
spark.sql.files.maxPartitionBytes                134217728
